# Tier 3 — full
# Standard + status-board + ER-Force autoref + quality-inspector. Mirrors the
# tournament setup. Useful for soak-testing or screen-sharing a match view.
# Run: docker compose -f docker/compose.full.yml up

services:
  simulator:
    image: roboticserlangen/simulatorcli:commit-6a4e1c06533b
    environment:
      GEOMETRY: "2020"
      REALISM: "RC2021"
    network_mode: host
    restart: unless-stopped

  autoref-tigers:
    image: tigersmannheim/auto-referee:1.7.1
    command: ["-hl", "-a", "--visionAddress", "224.5.23.2:10020"]
    network_mode: host
    restart: unless-stopped

  autoref-erforce:
    image: roboticserlangen/autoref:2025.1.0
    command: ["--vision-port", "10020"]
    network_mode: host
    restart: unless-stopped

  ssl-vision-client:
    image: robocupssl/ssl-vision-client:2.1.0
    command: ["-visionAddress", "224.5.23.2:10020"]
    network_mode: host
    restart: unless-stopped
    # UI: http://localhost:8082

  ssl-game-controller:
    image: robocupssl/ssl-game-controller:3.20.2
    command:
      - "-visionAddress"
      - "224.5.23.2:10020"
      - "-trackerAddress"
      - "224.5.23.2:10010"
      - "-publishAddress"
      - "224.5.23.1:10003"
      - "-address"
      - ":8081"
    volumes:
      - ssl-game-controller-config:/config
    network_mode: host
    restart: unless-stopped
    # UI: http://localhost:8081

  ssl-simulation-controller:
    image: robocupssl/ssl-simulation-controller:0.13.0
    command:
      - "-refereeAddress"
      - "224.5.23.1:10003"
      - "-visionAddress"
      - "224.5.23.2:10020"
      - "-trackerAddress"
      - "224.5.23.2:10010"
      - "-simControlPort"
      - "10300"
    network_mode: host
    restart: unless-stopped

  ssl-status-board:
    image: robocupssl/ssl-status-board:2.17.2
    # Remapped to :8083 to avoid collision with vision-client on :8082.
    command: ["-address", ":8083"]
    network_mode: host
    restart: unless-stopped
    # UI: http://localhost:8083

  ssl-quality-inspector:
    image: robocupssl/ssl-quality-inspector:latest
    network_mode: host
    restart: unless-stopped

volumes:
  ssl-game-controller-config:
